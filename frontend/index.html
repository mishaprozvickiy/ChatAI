<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>ChatAI</h1>
            <button id="clearBtn" class="btn-secondary">Очистить историю</button>
        </header>
        <main id="chatBox" class="chat-area"></main>
        <footer class="input-area">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
            <button id="sendBtn" class="btn-primary">Отправить</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
